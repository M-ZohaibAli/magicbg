 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Press - MagicBG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script type="module">
    import { createIcons, icons } from 'https://unpkg.com/lucide@latest/dist/esm/lucide.js';
    window.addEventListener('DOMContentLoaded', () => createIcons({ icons }));
  </script>
  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      font-family: 'Raleway', sans-serif;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Press Section -->
  <section class="container mx-auto px-6 py-16 flex-grow animate__animated animate__fadeIn">
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold text-cyan-400">In The Press</h1>
      <p class="mt-4 text-lg text-gray-300 max-w-2xl mx-auto">
        Discover how MagicBG is making headlines in the world of AI, automation, and design. Explore our latest press features and partnerships.
      </p>
    </div>

    <div id="pressContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
      <!-- Press items injected here -->
    </div>
  </section>

  <!-- Footer -->
  <div id="footer" class="mt-auto"></div>
<script src="/pages/script.js"></script>

  <!-- JavaScript to manage press entries -->
  <script>
    const pressItems = [
      {
        title: "MagicBG Featured in TechCrunch",
        date: "April 5, 2025",
        outlet: "TechCrunch",
        image: "https://source.unsplash.com/400x250/?newsroom,tech",
        excerpt: "MagicBG was spotlighted for its innovative use of multi-API integration in background removal technology.",
        link: "#"
      },
      {
        title: "Partnership with Adobe Marketplace",
        date: "March 22, 2025",
        outlet: "Adobe News",
        image: "https://source.unsplash.com/400x250/?adobe,software",
        excerpt: "MagicBG is now available on Adobe's Creative Cloud marketplace, allowing seamless background editing for creatives.",
        link: "#"
      },
      {
        title: "MagicBG Wins Best AI Tool Award",
        date: "February 10, 2025",
        outlet: "AI Awards 2025",
        image: "https://source.unsplash.com/400x250/?award,ai",
        excerpt: "Recognized as the top performer in automated design tools for its user-friendly interface and robust performance.",
        link: "#"
      }
    ];

    const pressContainer = document.getElementById("pressContainer");

    pressItems.forEach(item => {
      const card = document.createElement("div");
      card.className = "bg-gray-800 rounded-2xl overflow-hidden shadow-lg animate__animated animate__fadeInUp";
      card.innerHTML = `
        <img src="${item.image}" alt="${item.title}" class="w-full h-48 object-cover" />
        <div class="p-5">
          <div class="flex items-center gap-2 text-sm text-gray-400 mb-2">
            <i data-lucide="newspaper" class="w-4 h-4"></i> ${item.date} · ${item.outlet}
          </div>
          <h2 class="text-xl font-semibold text-white mb-2">${item.title}</h2>
          <p class="text-gray-300 text-sm mb-4">${item.excerpt}</p>
          <a href="${item.link}" target="_blank" class="inline-block bg-cyan-500 hover:bg-cyan-600 transition text-white px-4 py-2 rounded-lg text-sm font-medium">
            Read Article
          </a>
        </div>
      `;
      pressContainer.appendChild(card);
    });

    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>

</body>
</html>

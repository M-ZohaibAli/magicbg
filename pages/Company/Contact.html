 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - MagicBG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script type="module">
    import { createIcons, icons } from 'https://unpkg.com/lucide@latest/dist/esm/lucide.js';
    window.addEventListener('DOMContentLoaded', () => createIcons({ icons }));
  </script>
  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      font-family: 'Raleway', sans-serif;
    }
    input, textarea, select {
      background-color: #1e293b;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Contact Section -->
  <section class="container mx-auto px-6 py-16 flex-grow animate__animated animate__fadeIn">
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold text-cyan-400">Get in Touch</h1>
      <p class="mt-4 text-lg text-gray-300 max-w-2xl mx-auto">
        We'd love to hear from you. Whether you're a customer, partner, or press, reach out below!
      </p>
    </div>

    <form id="contactForm" class="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-800 p-8 rounded-2xl shadow-lg">
      <div class="col-span-2">
        <label class="block mb-2 text-sm font-medium text-gray-300">Full Name</label>
        <input type="text" name="name" required class="w-full p-3 rounded-md text-white border border-gray-600"/>
      </div>
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-300">Email</label>
        <input type="email" name="email" required class="w-full p-3 rounded-md text-white border border-gray-600"/>
      </div>
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-300">Phone</label>
        <input type="tel" name="phone" class="w-full p-3 rounded-md text-white border border-gray-600"/>
      </div>
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-300">Company</label>
        <input type="text" name="company" class="w-full p-3 rounded-md text-white border border-gray-600"/>
      </div>
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-300">Subject</label>
        <input type="text" name="subject" required class="w-full p-3 rounded-md text-white border border-gray-600"/>
      </div>
      <div class="col-span-2">
        <label class="block mb-2 text-sm font-medium text-gray-300">Service Type</label>
        <select name="service" class="w-full p-3 rounded-md text-white border border-gray-600">
          <option>General Inquiry</option>
          <option>Technical Support</option>
          <option>API Partnership</option>
          <option>Media/Press</option>
        </select>
      </div>
      <div class="col-span-2">
        <label class="block mb-2 text-sm font-medium text-gray-300">Message</label>
        <textarea name="message" rows="5" required class="w-full p-3 rounded-md text-white border border-gray-600"></textarea>
      </div>
      <div class="col-span-2">
        <button type="submit" class="bg-cyan-500 hover:bg-cyan-600 transition w-full p-3 rounded-lg font-semibold text-white">
          Send Message
        </button>
      </div>
    </form>

    <p id="statusMsg" class="text-center mt-6 text-green-400 hidden">Your message has been sent!</p>
  </section>

  <!-- Footer -->
  <div id="footer" class="mt-auto"></div>
<script src="/pages/script.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>

  <script>
    // TODO: Replace with your Firebase project config:
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const form = e.target;

      const data = {
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value,
        company: form.company.value,
        subject: form.subject.value,
        service: form.service.value,
        message: form.message.value,
        timestamp: new Date().toISOString()
      };

      database.ref("contactMessages").push(data)
        .then(() => {
          form.reset();
          document.getElementById("statusMsg").classList.remove("hidden");
          setTimeout(() => document.getElementById("statusMsg").classList.add("hidden"), 4000);
        })
        .catch(err => alert("Something went wrong. Check console." + console.error(err)));
    });
  </script>

</body>
</html>

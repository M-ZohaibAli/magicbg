 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog - MagicBG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script type="module">
    import { createIcons, icons } from 'https://unpkg.com/lucide@latest/dist/esm/lucide.js';
    window.addEventListener('DOMContentLoaded', () => createIcons({ icons }));
  </script>
  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      font-family: 'Raleway', sans-serif;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Blog Section -->
  <section class="container mx-auto px-6 py-16 flex-grow animate__animated animate__fadeIn">
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold text-cyan-400">MagicBG Blog</h1>
      <p class="mt-4 text-lg text-gray-300 max-w-2xl mx-auto">
        Explore tips, tutorials, updates, and insights from the team behind MagicBG.
      </p>
    </div>

    <div id="blogContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
      <!-- Blog cards will be injected here -->
    </div>
  </section>

  <!-- Footer -->
  <div id="footer" class="mt-auto"></div>
<script src="/pages/script.js"></script>

  <!-- JavaScript to manage blog posts -->
  <script>
    const blogs = [
      {
        title: "5 Ways to Use MagicBG for Your E-Commerce Photos",
        image: "https://source.unsplash.com/400x250/?ecommerce,product",
        excerpt: "Learn how to create clean, professional product photos with background removal tools.",
        date: "April 25, 2025",
        link: "#"
      },
      {
        title: "How MagicBG Integrates Multiple APIs for Speed & Quality",
        image: "https://source.unsplash.com/400x250/?technology,ai",
        excerpt: "We dive into the tech stack behind our fast, reliable background removal services.",
        date: "April 20, 2025",
        link: "#"
      },
      {
        title: "Meet the Developers: Behind the Scenes at CodeOxide",
        image: "https://source.unsplash.com/400x250/?developers,teamwork",
        excerpt: "A look into the creative minds at CodeOxide who brought MagicBG to life.",
        date: "April 15, 2025",
        link: "#"
      }
    ];

    const blogContainer = document.getElementById('blogContainer');

    blogs.forEach(blog => {
      const card = document.createElement('div');
      card.className = "bg-gray-800 rounded-2xl overflow-hidden shadow-lg animate__animated animate__fadeInUp";
      card.innerHTML = `
        <img src="${blog.image}" alt="${blog.title}" class="w-full h-48 object-cover">
        <div class="p-5">
          <div class="flex items-center gap-2 text-sm text-gray-400 mb-2">
            <i data-lucide="calendar" class="w-4 h-4"></i> ${blog.date}
          </div>
          <h2 class="text-xl font-semibold text-white mb-2">${blog.title}</h2>
          <p class="text-gray-300 text-sm mb-4">${blog.excerpt}</p>
          <a href="${blog.link}" class="inline-block bg-cyan-500 hover:bg-cyan-600 transition text-white px-4 py-2 rounded-lg text-sm font-medium">
            Read More
          </a>
        </div>
      `;
      blogContainer.appendChild(card);
    });

    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>

</body>
</html>
